name: VibeVoice TTS
on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Text to convert to speech'
        required: true
        type: string
        default: 'Hello, I am Adwa. This is voice powered by VibeVoice on GitHub Actions.'
      voice:
        description: 'Speaker voice (or leave default for preset)'
        required: false
        type: string
        default: 'en-Maya_woman'
      ref_audio_url:
        description: 'URL to reference audio for voice cloning (10-30s WAV/MP3)'
        required: false
        type: string
        default: ''
      model:
        description: 'Model ID'
        required: false
        type: choice
        options:
          - microsoft/VibeVoice-Realtime-0.5B
          - microsoft/VibeVoice-1.5B
        default: 'microsoft/VibeVoice-Realtime-0.5B'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Pocket TTS
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pocket-tts scipy soundfile edge-tts
          echo "Pocket TTS + ffmpeg ready"
      
      - name: Generate speech
        env:
          VOICE_TEXT: ${{ inputs.text }}
          VOICE_OUTPUT: vibevoice_output.wav
          VOICE_MODEL: ${{ inputs.model }}
          VOICE_NAME: ${{ inputs.voice }}
          VOICE_REF_URL: ${{ inputs.ref_audio_url }}
          HF_HUB_ENABLE_HF_TRANSFER: 1
        run: python generate.py
      
      - name: Upload audio
        uses: actions/upload-artifact@v4
        with:
          name: vibevoice-audio
          path: vibevoice_output.wav
          retention-days: 7
